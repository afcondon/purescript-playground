package:
  name: playground-runtime
  description: Workspace the Playground backend compiles user code against. Its `src/Main.purs` is rewritten on every /session/compile request.
  bundle:
    module: Main
    platform: browser
    outfile: output/bundle.js
  dependencies:
    - aff
    - affjax
    - affjax-web
    - argonaut-codecs
    - argonaut-core
    - arrays
    - codec
    - codec-argonaut
    - console
    - control
    - effect
    - either
    - exceptions
    - foldable-traversable
    - foreign
    - foreign-object
    - functions
    - hylograph-graph
    - hylograph-layout
    - hylograph-transitions
    - identity
    - integers
    - lazy
    - lists
    - maybe
    - newtype
    - nonempty
    - now
    - nullable
    - numbers
    - ordered-collections
    - parsing
    - partial
    - prelude
    - profunctor
    - random
    - refs
    - st
    - strings
    - transformers
    - tuples
    - unfoldable
